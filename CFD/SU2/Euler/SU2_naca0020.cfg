%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
%                                                                              %
% SU2 configuration file                                                       %
% Case: NACA 0020, steady inviscid (Euler), subsonic workflow + mesh study     %
% Author: Peemanus Ritthidetch  |  University of Bristol                       %
% Notes: This is a COMPLETE, RUNNABLE config. Every section SU2 touches for a   %
%        steady Euler airfoil run is here and set explicitly (no hidden        %
%        defaults). Unlike config_template.cfg, it contains no placeholder or   %
%        duplicate options, so it parses and runs.                             %
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

% --------------------------- PROBLEM DEFINITION ------------------------------%
%
SOLVER= EULER                 % inviscid governing equations (Fluent: density-based, inviscid)
MATH_PROBLEM= DIRECT          % forward solve (not adjoint/optimization)
RESTART_SOL= NO               % start from freestream, not a previous solution
SYSTEM_MEASUREMENTS= SI       % metres, kilograms, Kelvin, Pascals

% --------------------------- SOLVER CONTROL ----------------------------------%
%
ITER= 6000                    % max pseudo-time iterations (stops early once converged)
CONV_FIELD= RMS_DENSITY       % monitor the density residual for convergence
CONV_RESIDUAL_MINVAL= -9      % converged when log10(residual) reaches -9
CONV_STARTITER= 10            % begin checking convergence after iter 10
CONV_CAUCHY_ELEMS= 100        % window size for the Cauchy convergence check
CONV_CAUCHY_EPS= 1E-10        % Cauchy series tolerance

% ----------------------- TIME-DEPENDENT SIMULATION ---------------------------%
% Steady run -> time off. (For the LCO case later, this section switches on.)
%
TIME_DOMAIN= NO               % steady (no physical time)
TIME_MARCHING= NO             % no unsteady time-marching
GRID_MOVEMENT= NONE           % airfoil is fixed (no rigid motion)
SURFACE_MOVEMENT= NONE        % no prescribed surface motion

% ---------------------- COMPRESSIBLE FREESTREAM ------------------------------%
%
MACH_NUMBER= 0.3              % robust subsonic. (Michigan rig is M~0.04 -> use INC_EULER later)
AOA= 2.0                      % angle of attack, degrees
SIDESLIP_ANGLE= 0.0           % 2D, no sideslip
FREESTREAM_PRESSURE= 101325.0     % sea-level standard, Pa
FREESTREAM_TEMPERATURE= 288.15    % sea-level standard, K
REF_DIMENSIONALIZATION= DIMENSIONAL   % keep coefficients in physical scaling

% --------------------------- FLUID MODEL -------------------------------------%
%
FLUID_MODEL= STANDARD_AIR     % ideal air; gamma & R below are hardcoded for this model
GAMMA_VALUE= 1.4              % ratio of specific heats
GAS_CONSTANT= 287.058         % J/(kg*K)

% ------------------------- REFERENCE VALUES ----------------------------------%
% Used to normalise CL/CD/CM. Unit chord, unit area (2D).
%
REF_ORIGIN_MOMENT_X= 0.25     % moment reference: quarter chord
REF_ORIGIN_MOMENT_Y= 0.00
REF_ORIGIN_MOMENT_Z= 0.00
REF_LENGTH= 1.0               % chord
REF_AREA= 1.0                 % planform area (per unit span in 2D)

% ----------------------- BOUNDARY CONDITIONS ---------------------------------%
% Must match the MARKER_TAG names inside the .su2 mesh exactly.
%
MARKER_EULER= ( airfoil )     % inviscid slip wall = the airfoil surface
MARKER_FAR= ( farfield )      % characteristic far-field = the outer circle

% ----------------------- SURFACE IDENTIFICATION ------------------------------%
%
MARKER_PLOTTING= ( airfoil )      % write surface fields (Cp, Mach) here
MARKER_MONITORING= ( airfoil )    % integrate CL/CD/CM here

% --------------------- COMMON NUMERICAL METHOD -------------------------------%
%
NUM_METHOD_GRAD= GREEN_GAUSS  % spatial gradient method
CFL_NUMBER= 5.0               % pseudo-time step size (lower = more stable, slower)
CFL_ADAPT= YES                % let SU2 grow/shrink CFL automatically
CFL_ADAPT_PARAM= ( 0.1, 2.0, 5.0, 1e4 )   % (down-factor, up-factor, CFL min, CFL max)

% ---------------------- FLOW NUMERICAL METHOD --------------------------------%
%
CONV_NUM_METHOD_FLOW= JST     % central scheme + artificial dissipation (robust subsonic)
JST_SENSOR_COEFF= ( 0.5, 0.02 )   % 2nd/4th-order dissipation coefficients
MUSCL_FLOW= NO                % 2nd-order reconstruction off (fine with JST here)
TIME_DISCRE_FLOW= EULER_IMPLICIT  % implicit pseudo-time integration

% ------------------------- LINEAR SOLVER -------------------------------------%
% Solves the implicit system each iteration.
%
LINEAR_SOLVER= FGMRES
LINEAR_SOLVER_PREC= ILU
LINEAR_SOLVER_ERROR= 1E-6
LINEAR_SOLVER_ITER= 10

% ------------------------- MULTIGRID -----------------------------------------%
%
MGLEVEL= 0                    % no multigrid (keep the first run simple/robust)

% ------------------------- INPUT / OUTPUT ------------------------------------%
%
MESH_FILENAME= naca0020_medium.su2    % the mesh to read (must be in this folder)
MESH_FORMAT= SU2
TABULAR_FORMAT= CSV
SCREEN_OUTPUT= ( INNER_ITER, RMS_DENSITY, LIFT, DRAG, MOMENT_Z )   % live table columns
HISTORY_OUTPUT= ( ITER, RMS_RES, AERO_COEFF )                      % what history.csv records
OUTPUT_FILES= ( RESTART, PARAVIEW, SURFACE_CSV )                   % files written at the end
OUTPUT_WRT_FREQ= 250          % write every 250 iterations
CONV_FILENAME= history        % -> history.csv
VOLUME_FILENAME= flow         % -> flow.vtu (open in ParaView)
SURFACE_FILENAME= surface_flow    % -> surface_flow.csv

%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
% SANITY CHECK after it runs:
%   CL ~ 0.23-0.25, CD ~ 0  (inviscid -> d'Alembert). This is your Stage-1
%   thin-airfoil theory validating the CFD.
% MESH STUDY: change MESH_FILENAME to naca0020_coarse / _fine, compare CL & CD.
% REAL MICHIGAN CASE (M~0.04): the compressible solver is stiff there; switch
%   to SOLVER= INC_EULER (incompressible) -- we'll set that up separately.
% IF IT STALLS/DIVERGES: lower CFL_NUMBER to 2.0 first.
